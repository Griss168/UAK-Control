name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create www directory with index.html
        run: |
          mkdir -p www
          cp uak.html www/index.html
          cp -r icons www/icons 2>/dev/null || true
          cp manifest.json www/manifest.json 2>/dev/null || true

      - name: Init Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.uak.control",
            "appName": "UAK Control",
            "webDir": "www",
            "server": {
              "cleartext": true,
              "allowNavigation": ["*"]
            },
            "android": {
              "allowMixedContent": true
            },
            "plugins": {
              "CapacitorHttp": {
                "enabled": true
              }
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Enable cleartext in AndroidManifest
        run: |
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Add storage and network permissions
        run: |
          sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>\n<\/manifest>/' android/app/src/main/AndroidManifest.xml

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system"/>
                <certificates src="user"/>
              </trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">4.3.2.1</domain>
            </domain-config>
          </network-security-config>
          EOF

      - name: Link network security config in AndroidManifest
        run: |
          sed -i 's/android:usesCleartextTraffic="true"/android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml

      - name: Patch MainActivity to allow HTTP
        run: |
          cat > android/app/src/main/java/com/uak/control/MainActivity.java << 'EOF'
          package com.uak.control;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView webView = getBridge().getWebView();
              WebSettings settings = webView.getSettings();
              settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
            }
          }
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set app icons
        run: |
          pip install Pillow -q
          python3 << 'EOF'
          from PIL import Image, ImageDraw
          import os, shutil

          sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192,
          }

          src = Image.open('icons/icon-512.png').convert('RGBA')
          base = 'android/app/src/main/res'
          # Farba pozadia zodpovedá theme_color aplikácie
          BG = (28, 28, 28)

          for folder, size in sizes.items():
            path = f'{base}/{folder}'
            os.makedirs(path, exist_ok=True)
            icon = src.resize((size, size), Image.LANCZOS)

            # ic_launcher.png — štvorcová ikona s tmavým pozadím (žiadna priehľadnosť)
            sq = Image.new('RGB', (size, size), BG)
            sq.paste(icon, mask=icon.split()[3])
            sq.save(f'{path}/ic_launcher.png')

            # ic_launcher_round.png — ikona orezaná na KRUH s tmavým pozadím
            # Tmavé pozadie zabraňuje bielemu kruhu pri priehľadných rohoch ikony
            rnd_bg = Image.new('RGB', (size, size), BG)
            rnd_bg.paste(icon, mask=icon.split()[3])
            # Vytvor masku kruhu
            circle_mask = Image.new('L', (size, size), 0)
            ImageDraw.Draw(circle_mask).ellipse([0, 0, size - 1, size - 1], fill=255)
            # Aplikuj masku
            rnd = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            rnd.paste(rnd_bg.convert('RGBA'), mask=circle_mask)
            rnd.save(f'{path}/ic_launcher_round.png')

            # Vymaž akékoľvek XML/foreground/background súbory z mipmap priečinka
            for fname in ['ic_launcher.xml', 'ic_launcher_round.xml',
                          'ic_launcher_foreground.png', 'ic_launcher_background.png']:
              fpath = f'{path}/{fname}'
              if os.path.exists(fpath):
                os.remove(fpath)
            print(f'{folder}: {size}x{size} square + round OK')

          # Zmaž mipmap-anydpi-v26 — obsahuje XML ktoré prepíšu naše PNG adaptívnou ikonou
          anydpi = f'{base}/mipmap-anydpi-v26'
          if os.path.exists(anydpi):
            shutil.rmtree(anydpi)
            print('Removed mipmap-anydpi-v26')

          # Zmaž VŠETKY ic_launcher* súbory z drawable priečinkov
          # (foreground.png, background.xml/png, atď. — všetko čo by mohlo aktivovať adaptive ikonu)
          for d in os.listdir(base):
            if 'drawable' in d:
              dp = f'{base}/{d}'
              for fname in os.listdir(dp):
                if fname.startswith('ic_launcher'):
                  os.remove(f'{dp}/{fname}')
                  print(f'Removed {dp}/{fname}')
          EOF

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uak-control-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
